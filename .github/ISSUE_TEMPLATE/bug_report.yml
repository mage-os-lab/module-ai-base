name: Bug report
description: Report a bug in MageOS_AiBase
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in the fields below.
  - type: input
    id: module-version
    attributes:
      label: Module version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: magento-version
    attributes:
      label: Magento / Mage-OS version
      placeholder: "Magento 2.4.7 / Mage-OS 2.2.0"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      description: Any relevant output from var/log/ or the browser console.
      render: shell
    validations:
      required: false
